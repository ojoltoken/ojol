<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OJOL Token - Trading Chart & History</title>
    <!-- Web3 -->
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <!-- Lightweight Charts -->
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js">
    </script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e17;
            color: #e5e7eb;
            min-height: 100vh;
            padding: 20px;
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, #00a651 0%, #008844 100%);
            padding: 20px 24px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-left .logo {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 900;
            backdrop-filter: blur(4px);
        }

        .header-left h1 {
            font-size: 22px;
            font-weight: 700;
        }

        .header-left h1 span {
            font-weight: 400;
            opacity: 0.8;
            font-size: 14px;
            display: block;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .wallet-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 18px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .wallet-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
        }

        .wallet-btn .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            display: inline-block;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        .wallet-address {
            font-size: 12px;
            font-weight: 500;
            opacity: 0.8;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ===== STATS BAR ===== */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #141b2b;
            border: 1px solid #1f2a3f;
            border-radius: 12px;
            padding: 14px 16px;
        }

        .stat-card .label {
            font-size: 11px;
            font-weight: 500;
            color: #6b7a8f;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 20px;
            font-weight: 700;
            margin-top: 4px;
            color: #fff;
        }

        .stat-card .value.green {
            color: #00a651;
        }
        .stat-card .value.red {
            color: #ef4444;
        }
        .stat-card .value .small {
            font-size: 13px;
            font-weight: 400;
            color: #6b7a8f;
            margin-left: 4px;
        }

        /* ===== MAIN LAYOUT ===== */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===== CHART SECTION ===== */
        .chart-section {
            background: #141b2b;
            border: 1px solid #1f2a3f;
            border-radius: 16px;
            padding: 16px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }

        .chart-header .title {
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-header .title i {
            color: #00a651;
        }

        .chart-timeframes {
            display: flex;
            gap: 4px;
            background: #0a0e17;
            padding: 4px;
            border-radius: 10px;
        }

        .chart-timeframes button {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #6b7a8f;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .chart-timeframes button:hover {
            color: #e5e7eb;
        }

        .chart-timeframes button.active {
            background: #00a651;
            color: white;
        }

        #chartContainer {
            width: 100%;
            height: 420px;
            border-radius: 12px;
            background: #0a0e17;
            position: relative;
        }

        .chart-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #6b7a8f;
            font-size: 14px;
            gap: 12px;
        }

        .chart-loading .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #1f2a3f;
            border-top-color: #00a651;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== HISTORY SIDEBAR ===== */
        .history-sidebar {
            background: #141b2b;
            border: 1px solid #1f2a3f;
            border-radius: 16px;
            padding: 16px;
            max-height: 600px;
            display: flex;
            flex-direction: column;
        }

        .history-sidebar .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .history-sidebar .sidebar-header h3 {
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-sidebar .sidebar-header h3 i {
            color: #00a651;
        }

        .history-sidebar .sidebar-header .badge {
            background: #1f2a3f;
            padding: 2px 10px;
            border-radius: 100px;
            font-size: 11px;
            color: #6b7a8f;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
        }

        .history-list::-webkit-scrollbar {
            width: 4px;
        }

        .history-list::-webkit-scrollbar-track {
            background: #0a0e17;
            border-radius: 4px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #00a651;
            border-radius: 4px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 4px;
            transition: all 0.3s;
            cursor: default;
            border-left: 3px solid transparent;
        }

        .history-item:hover {
            background: #1f2a3f;
        }

        .history-item.buy {
            border-left-color: #00a651;
        }

        .history-item.sell {
            border-left-color: #ef4444;
        }

        .history-item .h-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .history-item .h-left .h-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }

        .history-item .h-left .h-icon.buy {
            background: rgba(0, 166, 81, 0.2);
            color: #00a651;
        }

        .history-item .h-left .h-icon.sell {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .history-item .h-left .h-detail .h-main {
            font-weight: 600;
            font-size: 13px;
            color: #e5e7eb;
        }

        .history-item .h-left .h-detail .h-sub {
            font-size: 11px;
            color: #6b7a8f;
        }

        .history-item .h-left .h-detail .h-sub a {
            color: #00a651;
            text-decoration: none;
        }

        .history-item .h-left .h-detail .h-sub a:hover {
            text-decoration: underline;
        }

        .history-item .h-right {
            text-align: right;
        }

        .history-item .h-right .h-amount {
            font-weight: 700;
            font-size: 13px;
        }

        .history-item .h-right .h-amount.green {
            color: #00a651;
        }
        .history-item .h-right .h-amount.red {
            color: #ef4444;
        }

        .history-item .h-right .h-usd {
            font-size: 11px;
            color: #6b7a8f;
        }

        .history-empty {
            text-align: center;
            color: #6b7a8f;
            font-size: 13px;
            padding: 40px 0;
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 380px;
            width: 100%;
        }

        .toast {
            background: #1f2a3f;
            color: #e5e7eb;
            padding: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            animation: slideIn 0.4s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            border-left: 4px solid #00a651;
        }

        .toast.error {
            border-left-color: #ef4444;
        }
        .toast.info {
            border-left-color: #3b82f6;
        }

        .toast i {
            font-size: 16px;
        }

        .toast .toast-close {
            margin-left: auto;
            background: none;
            border: none;
            color: #6b7a8f;
            cursor: pointer;
            font-size: 14px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .header {
                padding: 16px;
                flex-direction: column;
                align-items: flex-start;
            }

            .header-right {
                width: 100%;
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }

            .stat-card .value {
                font-size: 16px;
            }

            .chart-section {
                padding: 12px;
            }

            #chartContainer {
                height: 300px;
            }

            .history-sidebar {
                max-height: 400px;
            }

            .chart-timeframes button {
                padding: 4px 10px;
                font-size: 11px;
            }
        }

        @media (max-width: 480px) {
            .stats-bar {
                grid-template-columns: 1fr 1fr;
            }

            .header-left h1 {
                font-size: 18px;
            }

            .header-left .logo {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <div class="logo">OJ</div>
            <div>
                <h1>OJOL Token <span>Real-time Trading Chart</span></h1>
            </div>
        </div>
        <div class="header-right">
            <button id="connectWalletBtn" class="wallet-btn">
                <i class="fas fa-wallet"></i>
                <span id="walletBtnText">Connect</span>
            </button>
        </div>
    </header>

    <!-- STATS BAR -->
    <div class="stats-bar">
        <div class="stat-card">
            <div class="label">Price</div>
            <div class="value" id="currentPrice">0.0000 <span class="small">USDT</span></div>
        </div>
        <div class="stat-card">
            <div class="label">24h Change</div>
            <div class="value" id="priceChange">0.00%</div>
        </div>
        <div class="stat-card">
            <div class="label">24h High</div>
            <div class="value" id="highPrice">0.0000 <span class="small">USDT</span></div>
        </div>
        <div class="stat-card">
            <div class="label">24h Low</div>
            <div class="value" id="lowPrice">0.0000 <span class="small">USDT</span></div>
        </div>
        <div class="stat-card">
            <div class="label">24h Volume</div>
            <div class="value" id="volume24h">0 <span class="small">OJOL</span></div>
        </div>
        <div class="stat-card">
            <div class="label">Treasury Balance</div>
            <div class="value" id="treasuryBalance">0 <span class="small">OJOL</span></div>
        </div>
    </div>

    <!-- MAIN GRID -->
    <div class="main-grid">
        <!-- CHART -->
        <div class="chart-section">
            <div class="chart-header">
                <div class="title">
                    <i class="fas fa-chart-candlestick"></i>
                    OJOL / USDT
                </div>
                <div class="chart-timeframes" id="timeframeButtons">
                    <button data-timeframe="10m">10m</button>
                    <button data-timeframe="30m" class="active">30m</button>
                    <button data-timeframe="1h">1h</button>
                    <button data-timeframe="4h">4h</button>
                    <button data-timeframe="1d">1d</button>
                </div>
            </div>
            <div id="chartContainer">
                <div class="chart-loading" id="chartLoading">
                    <div class="spinner"></div>
                    <span>Loading chart data...</span>
                </div>
            </div>
        </div>

        <!-- HISTORY SIDEBAR -->
        <div class="history-sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-clock-rotate-left"></i> Recent Transactions</h3>
                <span class="badge" id="historyCount">0</span>
            </div>
            <div class="history-list" id="historyList">
                <div class="history-empty">Loading transactions...</div>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ============================================================
        // CONFIGURATION
        // ============================================================
        const CONFIG = {
            chainId: 56,
            rpcUrl: 'https://bsc-dataseed.binance.com/',
            treasuryAddress: '0xf593282F7E1d2a5ebcd6c956834ca3B81720E8a7', 
            ojolAddress: '0x0cCB00abb35109FF33F0AbaB1C07915900954695',
            usdtAddress: '0x55d398326f99059fF775485246999027B3197955',
        };

        // ============================================================
        // ABI
        // ============================================================
        const TREASURY_ABI = [{
            "inputs": [],
            "name": "rate",
            "outputs": [{ "internalType": "uint256", "name": "", "type": "uint256" }],
            "stateMutability": "view",
            "type": "function"
        }, {
            "inputs": [],
            "name": "getTreasuryBalance",
            "outputs": [
                { "internalType": "uint256", "name": "ojolBalance", "type": "uint256" },
                { "internalType": "uint256", "name": "usdtBalance", "type": "uint256" }
            ],
            "stateMutability": "view",
            "type": "function"
        }, {
            "inputs": [{ "internalType": "address", "name": "account", "type": "address" }],
            "name": "isWhitelistedAddress",
            "outputs": [{ "internalType": "bool", "name": "", "type": "bool" }],
            "stateMutability": "view",
            "type": "function"
        }, {
            "inputs": [],
            "name": "paused",
            "outputs": [{ "internalType": "bool", "name": "", "type": "bool" }],
            "stateMutability": "view",
            "type": "function"
        }];

        const ERC20_ABI = [{
            "constant": true,
            "inputs": [{ "name": "_owner", "type": "address" }],
            "name": "balanceOf",
            "outputs": [{ "name": "balance", "type": "uint256" }],
            "type": "function"
        }, {
            "constant": true,
            "inputs": [],
            "name": "decimals",
            "outputs": [{ "name": "", "type": "uint8" }],
            "type": "function"
        }, {
            "constant": true,
            "inputs": [],
            "name": "symbol",
            "outputs": [{ "name": "", "type": "string" }],
            "type": "function"
        }];

        // ============================================================
        // STATE
        // ============================================================
        const state = {
            web3: null,
            account: null,
            connected: false,
            currentRate: 0,
            treasuryOjol: 0,
            treasuryUsdt: 0,
            chart: null,
            candlestickSeries: null,
            currentTimeframe: '30m',
            tradeHistory: [],
            allTransactions: [],
            priceData: [],
            high24h: 0,
            low24h: Infinity,
            volume24h: 0,
            startPrice24h: 0,
            isChartReady: false
        };

        // ============================================================
        // DOM REFS
        // ============================================================
        const $ = (id) => document.getElementById(id);
        const dom = {
            connectBtn: $('connectWalletBtn'),
            walletBtnText: $('walletBtnText'),
            currentPrice: $('currentPrice'),
            priceChange: $('priceChange'),
            highPrice: $('highPrice'),
            lowPrice: $('lowPrice'),
            volume24h: $('volume24h'),
            treasuryBalance: $('treasuryBalance'),
            historyList: $('historyList'),
            historyCount: $('historyCount'),
            chartLoading: $('chartLoading'),
            toastContainer: $('toastContainer'),
        };

        // ============================================================
        // UTILITY
        // ============================================================
        function formatNumber(num, decimals = 2) {
            if (!num || isNaN(num)) return '0.00';
            return parseFloat(num).toFixed(decimals);
        }

        function formatAddress(addr) {
            if (!addr) return '';
            return addr.slice(0, 6) + '...' + addr.slice(-4);
        }

        function fromWei(amount, decimals = 18) {
            if (!amount) return '0';
            return (parseFloat(amount) / Math.pow(10, decimals)).toString();
        }

        function getExplorerUrl(txHash) {
            return `https://bscscan.com/tx/${txHash}`;
        }

        function getTimeAgo(timestamp) {
            const diff = Date.now() - timestamp;
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'Just now';
            if (mins < 60) return mins + 'm ago';
            const hours = Math.floor(mins / 60);
            if (hours < 24) return hours + 'h ago';
            return Math.floor(hours / 24) + 'd ago';
        }

        function getTimeframeMinutes(timeframe) {
            const map = {
                '10m': 10,
                '30m': 30,
                '1h': 60,
                '4h': 240,
                '1d': 1440
            };
            return map[timeframe] || 30;
        }

        // ============================================================
        // TOAST
        // ============================================================
        function showToast(message, type = 'info', duration = 4000) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas ${type === 'error' ? 'fa-circle-xmark' : 'fa-circle-info'}"></i>
                <span>${message}</span>
                <button class="toast-close"><i class="fas fa-times"></i></button>
            `;
            dom.toastContainer.appendChild(toast);
            const closeBtn = toast.querySelector('.toast-close');
            closeBtn.addEventListener('click', () => toast.remove());
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, duration);
        }

        // ============================================================
        // WALLET
        // ============================================================
        async function connectWallet() {
            if (!window.ethereum) {
                showToast('Please install MetaMask!', 'error');
                return;
            }

            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const chainId = await window.ethereum.request({ method: 'eth_chainId' });

                if (parseInt(chainId) !== CONFIG.chainId) {
                    try {
                        await window.ethereum.request({
                            method: 'wallet_switchEthereumChain',
                            params: [{ chainId: `0x${CONFIG.chainId.toString(16)}` }]
                        });
                        setTimeout(() => window.location.reload(), 1000);
                        return;
                    } catch (switchError) {
                        showToast('Please switch to BSC Mainnet', 'error');
                        return;
                    }
                }

                state.account = accounts[0];
                state.connected = true;
                state.web3 = new Web3(window.ethereum);

                dom.walletBtnText.textContent = formatAddress(state.account);
                dom.connectBtn.innerHTML = `
                    <span class="dot"></span>
                    <span class="wallet-address">${formatAddress(state.account)}</span>
                `;

                showToast('Wallet connected!', 'info');
                await loadData();

            } catch (error) {
                console.error('Connection error:', error);
                showToast('Failed to connect wallet', 'error');
            }
        }

        // ============================================================
        // LOAD DATA
        // ============================================================
        async function loadData() {
            if (!state.connected || !state.web3) return;

            try {
                const treasury = new state.web3.eth.Contract(TREASURY_ABI, CONFIG.treasuryAddress);
                const ojol = new state.web3.eth.Contract(ERC20_ABI, CONFIG.ojolAddress);

                // Get rate
                const rateWei = await treasury.methods.rate().call();
                state.currentRate = parseFloat(fromWei(rateWei, 18));

                // Get treasury balance
                const balance = await treasury.methods.getTreasuryBalance().call();
                state.treasuryOjol = parseFloat(fromWei(balance.ojolBalance, 18));
                state.treasuryUsdt = parseFloat(fromWei(balance.usdtBalance, 18));

                // Update stats
                dom.treasuryBalance.innerHTML = `${formatNumber(state.treasuryOjol, 0)} <span class="small">OJOL</span>`;

                // Load transaction history from contract events
                await loadTransactionHistory();

                // Generate price data for chart
                generatePriceData();

                // Update chart
                if (state.isChartReady) {
                    updateChart();
                } else {
                    initChart();
                }

                updateStats();

            } catch (error) {
                console.error('Error loading data:', error);
                showToast('Error loading data: ' + error.message, 'error');
            }
        }

        // ============================================================
        // LOAD TRANSACTION HISTORY (Simulated from contract events)
        // ============================================================
        async function loadTransactionHistory() {
            try {
                const treasury = new state.web3.eth.Contract(TREASURY_ABI, CONFIG.treasuryAddress);

                // Get past events for buy and sell
                // Note: You need to add events to your contract for this to work
                // For now, we'll use simulated data or fetch from your backend

                // Try to get events if available
                try {
                    const buyEvents = await treasury.getPastEvents('TokensPurchased', {
                        fromBlock: 0,
                        toBlock: 'latest'
                    });

                    const sellEvents = await treasury.getPastEvents('TokensSold', {
                        fromBlock: 0,
                        toBlock: 'latest'
                    });

                    const allEvents = [...buyEvents, ...sellEvents];
                    state.allTransactions = allEvents.map(event => {
                        const isBuy = event.event === 'TokensPurchased';
                        return {
                            type: isBuy ? 'buy' : 'sell',
                            amount: parseFloat(fromWei(event.returnValues.ojolAmount || event.returnValues
                            .ojolAmount, 18)),
                            value: parseFloat(fromWei(event.returnValues.usdtAmount || event.returnValues
                            .usdtAmount, 18)),
                            txHash: event.transactionHash,
                            timestamp: parseInt(event.blockNumber) * 12000 // Approximate
                        };
                    });

                    state.allTransactions.sort((a, b) => b.timestamp - a.timestamp);
                    state.tradeHistory = state.allTransactions.slice(0, 50);

                } catch (e) {
                    // If events not available, generate mock data
                    generateMockTransactions();
                }

                renderHistory();

            } catch (error) {
                console.warn('Error loading transaction history:', error);
                generateMockTransactions();
                renderHistory();
            }
        }

        // ============================================================
        // GENERATE MOCK TRANSACTIONS (for testing)
        // ============================================================
        function generateMockTransactions() {
            const now = Date.now();
            const types = ['buy', 'sell'];
            state.allTransactions = [];

            for (let i = 0; i < 100; i++) {
                const type = types[Math.floor(Math.random() * types.length)];
                const amount = 10 + Math.random() * 990;
                const value = amount * state.currentRate * (type === 'buy' ? 1 : 0.95);
                state.allTransactions.push({
                    type: type,
                    amount: amount,
                    value: value,
                    txHash: '0x' + Array.from({ length: 64 }, () =>
                        Math.floor(Math.random() * 16).toString(16)).join(''),
                    timestamp: now - (i * 60000) - (Math.random() * 60000)
                });
            }

            state.allTransactions.sort((a, b) => b.timestamp - a.timestamp);
            state.tradeHistory = state.allTransactions.slice(0, 50);
        }

        // ============================================================
        // GENERATE PRICE DATA
        // ============================================================
        function generatePriceData() {
            const now = Date.now();
            const basePrice = state.currentRate || 0.056;
            const volatility = 0.02;
            const data = [];

            // Generate 2000 data points (approx 1 data point per minute)
            const count = 2000;

            for (let i = 0; i < count; i++) {
                const time = now - (count - i) * 60000;
                const randomWalk = (Math.random() - 0.5) * volatility * 2;
                const price = basePrice * (1 + randomWalk + Math.sin(i / 50) * 0.03);

                const open = price * (1 + (Math.random() - 0.5) * 0.005);
                const close = price * (1 + (Math.random() - 0.5) * 0.005);
                const high = Math.max(open, close) * (1 + Math.random() * 0.003);
                const low = Math.min(open, close) * (1 - Math.random() * 0.003);

                data.push({
                    time: Math.floor(time / 1000),
                    open: open,
                    high: high,
                    low: low,
                    close: close,
                    volume: 10 + Math.random() * 100
                });
            }

            state.priceData = data;
        }

        // ============================================================
        // INIT CHART
        // ============================================================
        function initChart() {
            const container = document.getElementById('chartContainer');

            state.chart = LightweightCharts.createChart(container, {
                layout: {
                    background: { color: '#0a0e17' },
                    textColor: '#6b7a8f',
                },
                grid: {
                    vertLines: { color: '#1f2a3f' },
                    horzLines: { color: '#1f2a3f' },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                },
                rightPriceScale: {
                    borderColor: '#1f2a3f',
                },
                timeScale: {
                    borderColor: '#1f2a3f',
                    timeVisible: true,
                    secondsVisible: false,
                },
                width: container.clientWidth,
                height: 420,
            });

            state.candlestickSeries = state.chart.addCandlestickSeries({
                upColor: '#00a651',
                downColor: '#ef4444',
                borderVisible: false,
                wickUpColor: '#00a651',
                wickDownColor: '#ef4444',
                priceFormat: {
                    type: 'price',
                    precision: 6,
                    minMove: 0.000001,
                },
            });

            // Add volume series
            const volumeSeries = state.chart.addHistogramSeries({
                color: '#1f2a3f',
                priceFormat: {
                    type: 'volume',
                },
                priceScaleId: '',
            });

            // Handle resize
            window.addEventListener('resize', () => {
                if (state.chart) {
                    state.chart.applyOptions({
                        width: container.clientWidth,
                    });
                }
            });

            dom.chartLoading.style.display = 'none';
            state.isChartReady = true;

            // Set data
            updateChart();
        }

        // ============================================================
        // UPDATE CHART
        // ============================================================
        function updateChart() {
            if (!state.isChartReady || !state.candlestickSeries) return;

            const timeframe = state.currentTimeframe;
            const minutes = getTimeframeMinutes(timeframe);
            const now = Date.now() / 1000;
            const cutoff = now - (minutes * 60);

            // Filter data based on timeframe
            let filteredData = state.priceData.filter(d => d.time >= cutoff);

            // If not enough data, generate more
            if (filteredData.length < 10) {
                generatePriceData();
                filteredData = state.priceData.filter(d => d.time >= cutoff);
            }

            // Group by timeframe
            const groupedData = groupCandles(filteredData, minutes);

            state.candlestickSeries.setData(groupedData);
            state.chart.timeScale().fitContent();

            // Update current price
            if (groupedData.length > 0) {
                const last = groupedData[groupedData.length - 1];
                dom.currentPrice.innerHTML = `${formatNumber(last.close, 6)} <span class="small">USDT</span>`;
            }
        }

        // ============================================================
        // GROUP CANDLES
        // ============================================================
        function groupCandles(data, minutes) {
            const grouped = [];
            let currentGroup = null;
            let currentTime = 0;

            for (const candle of data) {
                const groupTime = Math.floor(candle.time / (minutes * 60)) * (minutes * 60);

                if (groupTime !== currentTime) {
                    if (currentGroup) {
                        grouped.push(currentGroup);
                    }
                    currentTime = groupTime;
                    currentGroup = {
                        time: groupTime,
                        open: candle.open,
                        high: candle.high,
                        low: candle.low,
                        close: candle.close,
                        volume: candle.volume || 0,
                    };
                } else {
                    currentGroup.high = Math.max(currentGroup.high, candle.high);
                    currentGroup.low = Math.min(currentGroup.low, candle.low);
                    currentGroup.close = candle.close;
                    currentGroup.volume = (currentGroup.volume || 0) + (candle.volume || 0);
                }
            }

            if (currentGroup) {
                grouped.push(currentGroup);
            }

            return grouped;
        }

        // ============================================================
        // UPDATE STATS
        // ============================================================
        function updateStats() {
            const prices = state.priceData.map(d => d.close);
            if (prices.length === 0) return;

            const current = prices[prices.length - 1];
            const high = Math.max(...prices);
            const low = Math.min(...prices);
            const start = prices[0];

            // 24h change
            const change = ((current - start) / start) * 100;

            dom.currentPrice.innerHTML = `${formatNumber(current, 6)} <span class="small">USDT</span>`;
            dom.highPrice.innerHTML = `${formatNumber(high, 6)} <span class="small">USDT</span>`;
            dom.lowPrice.innerHTML = `${formatNumber(low, 6)} <span class="small">USDT</span>`;

            const changeEl = dom.priceChange;
            changeEl.textContent = `${change >= 0 ? '+' : ''}${formatNumber(change, 2)}%`;
            changeEl.className = 'value ' + (change >= 0 ? 'green' : 'red');

            // Volume
            const totalVolume = state.priceData.reduce((sum, d) => sum + (d.volume || 0), 0);
            dom.volume24h.textContent = formatNumber(totalVolume, 0);
        }

        // ============================================================
        // RENDER HISTORY
        // ============================================================
        function renderHistory() {
            if (!state.tradeHistory || state.tradeHistory.length === 0) {
                dom.historyList.innerHTML = '<div class="history-empty">No transactions found</div>';
                dom.historyCount.textContent = '0';
                return;
            }

            dom.historyCount.textContent = state.tradeHistory.length;

            dom.historyList.innerHTML = state.tradeHistory.map(h => `
                <div class="history-item ${h.type}">
                    <div class="h-left">
                        <div class="h-icon ${h.type}">
                            <i class="fas ${h.type === 'buy' ? 'fa-arrow-down' : 'fa-arrow-up'}"></i>
                        </div>
                        <div class="h-detail">
                            <div class="h-main">${h.type === 'buy' ? 'Buy' : 'Sell'} OJOL</div>
                            <div class="h-sub">${getTimeAgo(h.timestamp)} · <a href="${getExplorerUrl(h.txHash)}" target="_blank">View</a></div>
                        </div>
                    </div>
                    <div class="h-right">
                        <div class="h-amount ${h.type === 'buy' ? 'green' : 'red'}">${formatNumber(h.amount, 2)} OJOL</div>
                        <div class="h-usd">${formatNumber(h.value, 2)} USDT</div>
                    </div>
                </div>
            `).join('');
        }

        // ============================================================
        // TIMEFRAME CHANGE
        // ============================================================
        function changeTimeframe(timeframe) {
            state.currentTimeframe = timeframe;
            document.querySelectorAll('.chart-timeframes button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.timeframe === timeframe);
            });
            updateChart();
        }

        // ============================================================
        // AUTO REFRESH
        // ============================================================
        function startAutoRefresh() {
            setInterval(async () => {
                if (state.connected) {
                    await loadData();
                }
            }, 30000); // Refresh every 30 seconds
        }

        // ============================================================
        // INIT
        // ============================================================
        async function init() {
            // Event listeners
            dom.connectBtn.addEventListener('click', connectWallet);

            document.querySelectorAll('.chart-timeframes button').forEach(btn => {
                btn.addEventListener('click', function() {
                    changeTimeframe(this.dataset.timeframe);
                });
            });

            // Auto-connect if wallet available
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                    if (accounts.length > 0) {
                        await connectWallet();
                    } else {
                        // Show chart with mock data
                        generateMockTransactions();
                        generatePriceData();
                        initChart();
                        updateStats();
                        renderHistory();
                    }
                } catch (e) {
                    console.warn('Auto-connect failed:', e);
                    generateMockTransactions();
                    generatePriceData();
                    initChart();
                    updateStats();
                    renderHistory();
                }
            } else {
                generateMockTransactions();
                generatePriceData();
                initChart();
                updateStats();
                renderHistory();
                showToast('Please install MetaMask to connect', 'info', 5000);
            }

            startAutoRefresh();

            console.log('📊 OJOL Trading Chart loaded!');
            console.log('📊 Treasury:', CONFIG.treasuryAddress);
            console.log('🪙 OJOL:', CONFIG.ojolAddress);
            console.log('💰 USDT:', CONFIG.usdtAddress);

            if (CONFIG.treasuryAddress === '0x...') {
                console.warn('⚠️ Update treasuryAddress in CONFIG!');
            }
        }

        // Run
        init();
    </script>

</body>
